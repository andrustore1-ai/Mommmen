<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إدارة المطابخ</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="firebase.js"></script><style>
:root{--brand:#EA580B;--brand2:#FB923C;--line:#fed7aa;--soft:#fff7ed;--ink:#0f172a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff7ed,#f8fafc);font-family:'Cairo',Tahoma,Arial,sans-serif;color:var(--ink)}button,input,select{font-family:inherit}.top{height:56px;background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;display:flex;align-items:center;gap:10px;padding:0 14px;position:sticky;top:0;z-index:20;box-shadow:0 8px 24px rgba(234,88,11,.18)}.top b{font-size:18px;margin-inline-start:auto}.btn{border:0;border-radius:14px;padding:10px 14px;font-weight:950;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}.btn.primary{background:var(--brand);color:#fff}.btn.ghost{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.btn.red{background:#fee2e2;color:#991b1b}.btn.white{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28)}.wrap{width:min(1100px,100%);margin:auto;padding:18px 14px}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;margin-bottom:14px;box-shadow:0 18px 38px rgba(234,88,11,.09)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-weight:950;color:#9a3412}.field input,.field select{border:1px solid #fed7aa;border-radius:15px;min-height:44px;padding:10px 12px;font-weight:850}.tools{display:flex;gap:8px;flex-wrap:wrap}.kitchen{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid #fed7aa;border-radius:18px;padding:12px;margin-top:10px;background:#fffaf5}.muted{color:#64748b;font-weight:850}.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border-radius:18px;padding:13px 18px;font-weight:950;display:none;z-index:40}.toast.show{display:block}@media(max-width:720px){.grid{grid-template-columns:1fr}.kitchen{grid-template-columns:1fr}.top{flex-wrap:wrap;height:auto;padding:9px}}
</style></head><body><div id="toast" class="toast"></div><header class="top"><a class="btn white" href="لوحة-المتابعة.html">الرئيسية</a><a class="btn white" href="مطعم-المطبخ.html?kitchen=main">المطبخ الرئيسي</a><a class="btn white" href="مطعم-الوصفات-والتكلفة.html">الوجبات</a><button class="btn white" data-restaurant-sync>↻ مزامنة</button><span id="syncState" class="btn white">جاهز</span><b>إدارة المطابخ</b></header><main class="wrap"><section class="card"><h1 style="margin:0;color:#9a3412">المطابخ الفرعية</h1><p class="muted">أنشئ مطابخ مثل مطبخ الشاورما، البروست، العصائر. عند إضافة وجبة تختار مطبخها، والطلب يذهب للمطبخ المناسب. المطبخ الرئيسي يستقبل كل شيء.</p></section><section class="card"><div class="grid"><div class="field"><label>اسم المطبخ</label><input id="kName" placeholder="مثال: مطبخ الشاورما"></div><div class="field"><label>كود اختياري</label><input id="kId" placeholder="shawarma"></div><div class="field"><label>الحالة</label><select id="kActive"><option value="true">نشط</option><option value="false">غير نشط</option></select></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveKitchen()">حفظ المطبخ</button><button class="btn ghost" onclick="clearForm()">تفريغ</button></div></section><section class="card"><h2>قائمة المطابخ</h2><div id="kitchens"></div></section></main><script src="restaurant-enterprise-final.js"></script><script>
const APP='supermarket_pos_ar_v1';let editId='';function db(){return RestaurantEnterprise.ensure(RestaurantEnterprise.read())}function save(d){RestaurantEnterprise.save(d)}function toast(m){const e=document.getElementById('toast');e.textContent=m;e.className='toast show';setTimeout(()=>e.className='toast',2600)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function idify(v){return String(v||'').trim().replace(/[.#$\[\]/\\]/g,'_').replace(/\s+/g,'_')||('k_'+Date.now().toString(36))}
function render(){const d=db();document.getElementById('kitchens').innerHTML=RestaurantEnterprise.kitchens(d).map(k=>`<div class="kitchen"><div><b>${esc(k.name)}</b><div class="muted">${esc(k.id)} ${k.main?'· رئيسي ثابت':''}</div><div class="tools" style="margin-top:8px"><a class="btn ghost" href="مطعم-المطبخ.html?kitchen=${encodeURIComponent(k.id)}">فتح المطبخ</a></div></div><div class="tools"><button class="btn ghost" onclick="editKitchen('${esc(k.id)}')">تعديل</button>${k.main?'':`<button class="btn red" onclick="deleteKitchen('${esc(k.id)}')">حذف</button>`}</div></div>`).join('')}
function clearForm(){editId='';document.getElementById('kName').value='';document.getElementById('kId').value='';document.getElementById('kActive').value='true'}
function editKitchen(id){const d=db();const k=d.restaurantKitchens.find(x=>String(x.id)===String(id));if(!k)return;editId=k.id;document.getElementById('kName').value=k.name||'';document.getElementById('kId').value=k.id||'';document.getElementById('kActive').value=String(k.active!==false)}
function saveKitchen(){const d=db(),name=document.getElementById('kName').value.trim(),kid=idify(document.getElementById('kId').value||name),active=document.getElementById('kActive').value==='true';if(!name)return toast('اكتب اسم المطبخ');let list=d.restaurantKitchens;let old=list.find(x=>String(x.id)===String(editId||kid));if(old){old.name=name;old.active=active;old.updatedAt=new Date().toISOString()}else list.push({id:kid,name,active,sort:list.length+1,createdAt:new Date().toISOString()});save(d);clearForm();render();toast('تم الحفظ')}
function deleteKitchen(id){if(id==='main')return;if(!confirm('حذف المطبخ؟ الوجبات المرتبطة به ستعود للمطبخ الرئيسي.'))return;const d=db();d.restaurantKitchens=d.restaurantKitchens.filter(x=>String(x.id)!==String(id));(d.restaurantMenu||[]).forEach(x=>{if(String(x.kitchenId)===String(id)){x.kitchenId='main';x.kitchenName='المطبخ الرئيسي'}});save(d);render();toast('تم حذف المطبخ')}
render();
</script><script src="restaurant-emergency-fix.js"></script></body></html>
