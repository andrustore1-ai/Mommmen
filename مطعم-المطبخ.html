<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/><title>المطبخ</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/><style>
:root{--brand:#EA580B;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:var(--ink);font-family:'Cairo',Tahoma,Arial,sans-serif}button{font-family:inherit}.wrap{width:min(1240px,100%);margin:auto;padding:22px 16px 110px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.top h1{margin:0}.btn{border:0;border-radius:17px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.gray{background:#fff;color:#334155;border:1px solid var(--line)}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.blue{background:#2563eb}.actions{display:flex;gap:8px;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}.stat b{font-size:28px;color:var(--brand)}.orders{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.order{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}.order.new{border-color:#fed7aa}.order.preparing{border-color:#bfdbfe}.order.ready{border-color:#bbf7d0}.orderHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill{border-radius:999px;padding:5px 11px;font-weight:900;font-size:12px;background:#f1f5f9;color:#475569}.items{margin:12px 0;border-top:1px dashed #e2e8f0}.item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e2e8f0;font-weight:800}.muted{color:var(--muted);font-weight:800}.bell{position:relative}.badge{position:absolute;top:-8px;right:-8px;background:#ef4444;color:white;min-width:25px;height:25px;border-radius:999px;border:3px solid #fff;display:grid;place-items:center;font-size:12px}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:16px;padding:8px}.bottom .active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;width:min(520px,calc(100% - 28px));padding:14px;border-radius:18px;background:#111827;color:white;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:1000px){.orders{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}}@media(max-width:620px){.orders,.stats{grid-template-columns:1fr}.order{border-radius:22px}}
.notesModal{position:fixed;inset:0;background:rgba(2,6,23,.62);z-index:120;display:none;align-items:flex-end;justify-content:center}.notesModal.show{display:flex}.notesPanel{width:min(760px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:18px}.noteMeal{border:1px solid #fed7aa;background:#fff7ed;border-radius:20px;padding:12px;margin:10px 0}.tag{display:inline-flex;border-radius:999px;padding:5px 9px;margin:3px;background:#fff;color:#9a3412;border:1px solid #fed7aa;font-weight:900;font-size:12px}</style></head><body><div class="toast" id="toast"></div><div class="wrap"><div class="top"><div><h1>شاشة المطبخ</h1><div class="muted">وضع فاتح، الطلبات الجديدة تظهر لحظياً</div></div><div class="actions"><button class="btn gray bell" onclick="render()"><span id="bellIcon"></span><span class="badge" id="newBadge">0</span></button><a class="btn gray" href="مطعم-إعدادات-المطعم.html">الإدارة</a><a class="btn" href="الكاشير.html">الكاشير</a></div></div><div class="stats"><div class="stat">طلبات جديدة<br/><b id="sNew">0</b></div><div class="stat">قيد التحضير<br/><b id="sPrep">0</b></div><div class="stat">جاهزة<br/><b id="sReady">0</b></div><div class="stat">الإجمالي المفتوح<br/><b id="sAll">0</b></div></div><div class="orders" id="orders"></div></div><div class="notesModal" id="notesModal" onclick="if(event.target.id==='notesModal')closeNotes()"><div class="notesPanel"><div class="orderHead"><h2 id="notesTitle">ملاحظات الطلب</h2><button class="btn red" onclick="closeNotes()">إغلاق</button></div><div id="notesBody"></div></div></div><nav class="bottom"><a href="مطعم-إعدادات-المطعم.html">إدارة</a><a href="مطعم-الطاولات.html">طاولات</a><a class="active" href="مطعم-المطبخ.html">مطبخ</a><a href="الكاشير.html">كاشير</a><a href="مطعم-تحليلات-الأرباح.html">تقارير</a></nav><script src="firebase.js"></script><script src="r7-core.js"></script><script src="r7-local-restaurant-adapter.js"></script><script>window.R7F&& (R7F.requireAdmin=function(){return true});</script><script src="restaurant-production-pos.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');let settings=R7F.settingsWithDefaults(null),orders={};const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function playBell(){try{const a=new Audio('qr.mp3');a.volume=.45;a.play().catch(()=>{})}catch(e){}}let lastNew=0;function closeNotes(){document.getElementById('notesModal').classList.remove('show')}function arrText(v){if(!v)return '';if(Array.isArray(v))return v.map(x=>x.name||x).join('، ');return String(v)}function openNotes(id){const o=orders[id]||{};document.getElementById('notesTitle').textContent='ملاحظات '+(o.orderNo||'');document.getElementById('notesBody').innerHTML=`${o.note?`<div class="noteMeal"><b>ملاحظة الطلب:</b><br>${esc(o.note)}</div>`:''}${(o.items||[]).map(i=>{const ex=arrText(i.extras),rm=arrText(i.removes);return `<div class="noteMeal"><h3 style="margin:0 0 8px">${esc(i.name)} × ${i.qty}</h3>${ex?`<div><b>الإضافات:</b><br>${ex.split('، ').map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:''}${rm?`<div><b>بدون / حذف:</b><br>${rm.split('، ').map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:''}${i.note?`<div><b>ملاحظة الوجبة:</b><br>${esc(i.note)}</div>`:''}${(!ex&&!rm&&!i.note)?'<div class="muted">لا توجد ملاحظات خاصة لهذه الوجبة.</div>':''}</div>`}).join('')||'<div class="muted">لا توجد عناصر.</div>'}`;document.getElementById('notesModal').classList.add('show')}function render(){document.documentElement.style.setProperty('--brand',settings.themeColor);$('bellIcon').innerHTML=R7F.icon('bell');const arr=R7F.list(orders).filter(o=>o.channel==='kitchen'&&['new','preparing','ready'].includes(o.status)).sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0));const n=arr.filter(o=>o.status==='new').length,p=arr.filter(o=>o.status==='preparing').length,r=arr.filter(o=>o.status==='ready').length;$('sNew').textContent=n;$('sPrep').textContent=p;$('sReady').textContent=r;$('sAll').textContent=arr.length;$('newBadge').textContent=n;$('newBadge').style.display=n?'grid':'none';if(n>lastNew){playBell()}lastNew=n;$('orders').innerHTML=arr.map(o=>`<div class="order ${esc(o.status)}"><div class="orderHead"><div><h2 style="margin:0">${esc(o.orderNo)}</h2><div class="muted">${o.table?'طاولة '+esc(o.table):'طلب منيو'} · ${R7F.localDate(o.createdAt)}</div></div><span class="pill">${R7F.statusLabel(o.status)}</span></div><div class="items">${(o.items||[]).map(i=>`<div class="item"><span>${esc(i.name)}</span><b>× ${i.qty}</b></div>`).join('')}</div>${o.note?`<div class="muted">ملاحظة: ${esc(o.note)}</div>`:''}<div class="actions" style="margin-top:12px">${o.status==='new'?`<button class="btn blue" onclick="setStatus('${o.id}','preparing')">استلام / تحضير</button>`:''}${o.status==='preparing'?`<button class="btn green" onclick="setStatus('${o.id}','ready')">جاهز</button>`:''}${o.status==='ready'?`<button class="btn green" onclick="deliver('${o.id}')">تسليم وتسجيل فاتورة</button>`:''}<button class="btn gray" onclick="openNotes('${o.id}')">الملاحظات</button><button class="btn red" onclick="setStatus('${o.id}','cancelled')">إلغاء</button></div></div>`).join('')||'<div class="order"><h2>لا توجد طلبات مفتوحة</h2><div class="muted">عند وصول طلب جديد سيظهر هنا مباشرة.</div></div>'}async function setStatus(id,status){try{await R7F.update('orders/'+id,{status,updatedAt:R7F.now()});toast('تم التحديث')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deliver(id){try{await R7F.markDelivered(id,orders[id],settings);toast('تم التسليم وتسجيل الفاتورة في التقارير')}catch(e){toast(R7F.errorMessage(e),'err')}}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('orders',v=>{orders=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script><script src="restaurant-enterprise-final.js"></script><script src="restaurant-emergency-fix.js"></script></body></html>
