<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>الطاولات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#EA580B;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:var(--ink);font-family:'Cairo',Tahoma,Arial,sans-serif}button,input{font-family:inherit}.wrap{width:min(1180px,100%);margin:auto;padding:22px 16px 110px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.top h1{margin:0}.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:12px;outline:none;font-weight:800}label{display:block;font-size:13px;color:#475569;font-weight:900;margin-bottom:6px}.btn{border:0;border-radius:17px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.gray{background:#f1f5f9;color:#334155}.btn.red{background:#fee2e2;color:#991b1b}.actions{display:flex;gap:8px;flex-wrap:wrap}.tables{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.tableCard{background:#fff;border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:var(--shadow);break-inside:avoid}.qr{width:100%;aspect-ratio:1/1;background:#fff;border:1px solid var(--line);border-radius:18px;object-fit:contain;padding:10px}.muted{color:var(--muted);font-weight:800;font-size:13px;word-break:break-all}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:16px;padding:8px}.bottom .active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;width:min(520px,calc(100% - 28px));padding:14px;border-radius:18px;background:#111827;color:white;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.tables{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}}@media(max-width:560px){.grid,.tables{grid-template-columns:1fr}}@media print{.top,.card.form,.actions,.bottom{display:none!important}.wrap{padding:0}.tables{grid-template-columns:repeat(2,1fr)}.tableCard{box-shadow:none}}
</style></head><body><div id="toast" class="toast"></div><div class="wrap"><div class="top"><div><h1>إدارة الطاولات و QR</h1><div class="muted">كل طاولة لها رابط منيو مختلف</div></div><div class="actions"><a class="btn gray" href="مطعم-إعدادات-المطعم.html">الإدارة</a><a class="btn" href="مطعم-المنيو-الرقمي.html" target="_blank">المنيو</a><button class="btn gray" onclick="window.print()">طباعة QR</button></div></div><div class="card form"><h2>توليد الطاولات</h2><div class="grid"><div><label>من رقم</label><input id="from" type="number" class="field" value="1"></div><div><label>إلى رقم</label><input id="to" type="number" class="field" value="10"></div><div><label>بادئة اختيارية</label><input id="prefix" class="field" placeholder="A"></div><div><label>رابط المنيو العام</label><input id="baseUrl" class="field" placeholder="تلقائي من الإعدادات"></div></div><div class="actions" style="margin-top:12px"><button class="btn" onclick="generateBatch()">توليد وحفظ</button><button class="btn gray" onclick="render()">تحديث</button><button class="btn red" onclick="deleteAllTables()">حذف كل الطاولات</button></div></div><div id="tables" class="tables"></div></div><nav class="bottom"><a href="مطعم-إعدادات-المطعم.html">إدارة</a><a class="active" href="مطعم-الطاولات.html">طاولات</a><a href="مطعم-المطبخ.html">مطبخ</a><a href="الكاشير.html">كاشير</a><a href="مطعم-تحليلات-الأرباح.html">تقارير</a></nav><script src="firebase.js"></script><script src="r7-core.js"></script><script src="r7-local-restaurant-adapter.js"></script><script>window.R7F&& (R7F.requireAdmin=function(){return true});</script><script>
if(!R7F.requireAdmin()) throw new Error('login');let settings=R7F.settingsWithDefaults(null),tables={};const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function base(){return $('baseUrl').value.trim()||R7F.menuBaseUrl(settings).replace(/index\.html[^?]*/, 'مطعم-المنيو-الرقمي.html')}function linkFor(no){const u=base();return u+(u.includes('?')?'&':'?')+'table='+encodeURIComponent(no)}function render(){document.documentElement.style.setProperty('--brand',settings.themeColor);$('baseUrl').placeholder=R7F.menuBaseUrl(settings).replace(/index\.html[^?]*/, 'مطعم-المنيو-الرقمي.html');const arr=R7F.list(tables).sort((a,b)=>String(a.number).localeCompare(String(b.number),'ar',{numeric:true}));$('tables').innerHTML=arr.map(t=>{const link=t.link||linkFor(t.number);return `<div class="tableCard"><h2>طاولة ${esc(t.number)}</h2><img class="qr" src="${R7F.qrUrl(link)}"><div class="muted">${esc(link)}</div><div class="actions" style="margin-top:10px"><button class="btn gray" onclick="copy('${encodeURIComponent(link)}')">نسخ</button><button class="btn red" onclick="deleteTable('${esc(t.id)}')">حذف</button></div></div>`}).join('')||'<div class="card">لا توجد طاولات.</div>'}async function generateBatch(){try{const f=Number($('from').value||1),t=Number($('to').value||f),prefix=$('prefix').value.trim();if(t<f)return toast('رقم النهاية أصغر من البداية','err');const updates={};for(let i=f;i<=t;i++){const no=prefix+String(i);const id=R7F.sanitizeId(no);updates[id]={number:no,label:'طاولة رقم '+no,link:linkFor(no),active:true,createdAt:Date.now(),updatedAt:R7F.now()}}await R7F.update('tables',updates);toast('تم توليد الطاولات')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deleteTable(id){if(!confirm('حذف الطاولة؟'))return;await R7F.remove('tables/'+id);toast('تم الحذف')}async function deleteAllTables(){if(!confirm('حذف كل الطاولات؟'))return;await R7F.remove('tables');toast('تم الحذف')}function copy(encoded){navigator.clipboard&&navigator.clipboard.writeText(decodeURIComponent(encoded));toast('تم نسخ الرابط')}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('tables',v=>{tables=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script><script src="restaurant-enterprise-final.js"></script><script src="restaurant-emergency-fix.js"></script><script src="restaurant-menu-live-settings-v8.js"></script></body></html>
